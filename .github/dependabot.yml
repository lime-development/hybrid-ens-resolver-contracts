version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      openzeppelin:
        patterns:
          - "@openzeppelin/*"
      hardhat:
        patterns:
          - "hardhat*"
          - "@nomicfoundation/*"
    commit-message:
      prefix: "deps"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
