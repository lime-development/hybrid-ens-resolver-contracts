name: Test

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - 'contracts/**'
      - 'test/**'
      - 'hardhat.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.mocharc.json'
      - '.github/workflows/contracts.yml'
  pull_request:
    branches: [ master, main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Install Node.js dependencies
      run: npm ci

    - name: Compile contracts
      run: npm run compile

    - name: Run contract tests
      run: npm test
      timeout-minutes: 10
